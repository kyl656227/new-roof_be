spring:
  application:
    name: new-roof-be
  datasource:
    url: jdbc:h2:mem:newroof;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8080

shelter:
  api:
    key: ${SHELTER_API_KEY}

logging:
  level:
    com.newroof: DEBUG
